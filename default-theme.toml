# Generated by `tspin --generate-default-theme` — DO NOT EDIT.
#
# Every value below is a default: copying this file to
# ~/.config/tailspin/theme.toml and leaving it unchanged does nothing.
# Edit the styles you want to override and delete the rest.
#
# Keyword ([[keywords]]) and regex ([[regexes]]) highlights are additive
# lists and default to empty; the built-in keywords are compiled into tspin.
# See the README for their syntax.

[numbers]
style = { fg = "cyan" }

[uuids]
number = { fg = "blue", italic = true }
letter = { fg = "magenta", italic = true }
separator = { fg = "red" }

[quotes]
quote_token = '"'
style = { fg = "yellow" }

[ipv4]
number = { fg = "blue", italic = true }
separator = { fg = "red" }

[ipv6]
number = { fg = "blue", italic = true }
letter = { fg = "magenta", italic = true }
separator = { fg = "red" }

[dates]
date = { fg = "magenta" }
time = { fg = "blue" }
zone = { fg = "red" }
separator = { faint = true }

[durations]
value = { fg = "blue" }
separator = { fg = "magenta" }
unit = { fg = "magenta", italic = true }

[paths]
segment = { fg = "green" }
separator = { fg = "yellow" }

[urls]
http = { fg = "red", faint = true }
https = { fg = "green", faint = true }
host = { fg = "blue", faint = true }
path = { fg = "blue" }
query_params_key = { fg = "magenta" }
query_params_value = { fg = "cyan" }
symbols = { fg = "red" }

[emails]
local_part = { fg = "green", underline = true }
at_sign = { fg = "red" }
domain = { fg = "green", underline = true }
dot = { fg = "red" }

[pointers]
number = { fg = "blue", italic = true }
letter = { fg = "magenta", italic = true }
x = { fg = "red" }

[processes]
name = { fg = "yellow" }
id = { fg = "cyan" }
bracket = { fg = "red" }

[key_value_pairs]
key = { faint = true }
separator = { fg = "white" }

[json]
key = { faint = true }
quote_token = { faint = true }
curly_bracket = { faint = true }
square_bracket = { faint = true }
comma = { faint = true }
colon = { faint = true }

[jvm_stack_traces]
caused_by = { bold = true }
package = { fg = "red", faint = true }
exception = { fg = "red" }
frame = { fg = "red", faint = true }
file = { fg = "yellow" }
unknown_source = { fg = "yellow", faint = true }
line_number = { fg = "cyan" }
